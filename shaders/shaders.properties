# /shaders/shaders.properties
# DOSGL-13h (Iris/Oculus) — GL 4.1 safe

oldLighting=true
alphaTest.gbuffers_clouds=GREATER 0.1
alphaTest.gbuffers_skytextured=GREATER 0.1
sky=true
stars=true

# Disable unused composite pipeline
program.composite1.enabled=false
program.composite2.enabled=false
program.composite3.enabled=false
program.composite4.enabled=false
program.composite5.enabled=false
program.composite6.enabled=false
program.composite7.enabled=false
program.composite8.enabled=false
program.composite9.enabled=false
program.composite10.enabled=false
program.composite11.enabled=false
program.composite12.enabled=false
program.composite13.enabled=false
program.composite14.enabled=false
program.composite15.enabled=false
program.composite16.enabled=false

# Render particles before deferred / translucent passes (stained glass fix)
particles.ordering=before
particles.before.deferred=true

# ===== Config Screen Layout =====

screen = DOS_SCALE AMBIENT_FLOOR \
         DOS_LIGHT_STEPS <empty> \
         [COLOR] [AFFINE] \
         [FOG] [HANDS] \
         [ADDONS] <empty>
screen.columns = 2

screen.COLOR = DOS_PALETTE_256 DOS_PALETTE_BYPASS
screen.COLOR.columns = 1

screen.AFFINE = DOS_AFFINE_ENABLE DOS_AFFINE_NEAR DOS_AFFINE_RANGE
screen.AFFINE.columns = 1

screen.FOG = FOG_TUNE_ENABLE <empty> \
             FOG_START_SCALE FOG_START_ADD \
             FOG_END_SCALE FOG_END_ADD \
             FOG_DENSITY_SCALE FOG_MIN_RANGE
screen.FOG.columns = 2

screen.HANDS = HAND_FLATTEN HAND_DITHER HAND_DITHER_STRENGTH
screen.HANDS.columns = 1

screen.ADDONS = FLATTER_SIGNS BILLY_BOARDING
screen.ADDONS.columns = 1

sliders = DOS_SCALE AMBIENT_FLOOR DOS_LIGHT_STEPS \
          DOS_AFFINE_NEAR DOS_AFFINE_RANGE \
          FOG_START_SCALE FOG_START_ADD FOG_END_SCALE FOG_END_ADD FOG_DENSITY_SCALE FOG_MIN_RANGE \
          HAND_DITHER_STRENGTH